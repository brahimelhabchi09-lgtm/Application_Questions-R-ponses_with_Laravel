services:

  php:
    build: .
    container_name: php
    volumes:
      - "./backend:/var/www/html"
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "3535:80"
    volumes:
      - "./backend:/var/www/html"
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    
    depends_on:
      - php

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: "my_db"
      POSTGRES_USER: "gordo"
      POSTGRES_PASSWORD: "2004"
    ports:
      - "2004:5432"
    volumes:
      - pgtables:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:snapshot
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "gordo@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "2004"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  frontend:
    image: qa-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qa-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_TARGET: "http://nginx"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  

volumes:
  pgtables:
  pgadmin_data:
  php_cache:
  php_vendor:
